name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PNPM_VERSION: '9.15.4'
  NODE_VERSION: '20'
  DATABASE_URL: 'postgresql://qa:qa@localhost:5432/qa?schema=public'
  API_PORT: '3001'
  WEB_PORT: '3000'
  JWT_SECRET: 'ci-secret-not-real'
  ENABLE_TEST_ENDPOINTS: 'true'
  NEXT_PUBLIC_API_URL: 'http://localhost:3001'
  API_BASE_URL: 'http://localhost:3001'
  E2E_BASE_URL: 'http://localhost:3000'

jobs:
  lint:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm -r typecheck

  unit:
    name: Vitest (web + api + contracts + db)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r test:unit

  build:
    name: Build (web + api)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @qa/contracts build
      - run: pnpm -F @qa/db build
      - run: pnpm -F @qa/api build
      - run: pnpm -F @qa/web build

  test:
    name: Playwright (e2e + api)
    runs-on: ubuntu-latest
    needs: [build, unit]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: qa
          POSTGRES_PASSWORD: qa
          POSTGRES_DB: qa
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @qa/tests exec playwright install --with-deps chromium
      - name: Build SUT (api + web)
        # The build/ job runs on a separate runner so its dist/ is gone by
        # the time this job starts. Playwright's webServer launches
        # `pnpm @qa/api start` and `pnpm @qa/web start`, which both need
        # the compiled output — build them here.
        run: |
          pnpm -F @qa/contracts build
          pnpm -F @qa/db build
          pnpm -F @qa/api build
          pnpm -F @qa/web build
      - run: pnpm -F @qa/db exec prisma migrate deploy
      - run: pnpm -F @qa/db seed
      - name: Playwright (PR — @smoke only)
        if: github.event_name == 'pull_request'
        run: pnpm --filter @qa/tests exec playwright test --project=chromium-desktop --grep @smoke
      - name: Playwright (push to main — full suite)
        if: github.event_name == 'push'
        run: pnpm --filter @qa/tests exec playwright test --project=chromium-desktop
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report
          retention-days: 7
