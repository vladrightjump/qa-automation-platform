name: Perf

# Phase 15d — Lighthouse + Web Vitals budgets enforced as a separate
# nightly workflow. The job builds the SUT, bulk-seeds the catalog, runs
# the `lighthouse-perf` Playwright project, and uploads the report bundle
# as an artifact. A budget breach (asserted inside the perf specs) fails
# the workflow.

on:
  schedule:
    # 04:00 UTC nightly — off-peak for GH Actions and the team.
    - cron: '0 4 * * *'
  workflow_dispatch:
  pull_request:
    branches: [main]
    # Only run on PRs that touch the SUT or perf code; cuts ~10 min off
    # docs-only PRs and stays under the free-tier budget.
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'tests/perf/**'
      - 'tests/playwright.config.ts'
      - '.github/workflows/perf.yml'

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PNPM_VERSION: '9.15.4'
  NODE_VERSION: '20'
  DATABASE_URL: 'postgresql://qa:qa@localhost:5432/qa?schema=public'
  API_PORT: '3001'
  WEB_PORT: '3000'
  JWT_SECRET: 'ci-secret-not-real'
  ENABLE_TEST_ENDPOINTS: 'true'
  NEXT_PUBLIC_API_URL: 'http://localhost:3001'
  API_BASE_URL: 'http://localhost:3001'
  E2E_BASE_URL: 'http://localhost:3000'

jobs:
  lighthouse:
    name: Lighthouse + Web Vitals budgets
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: qa
          POSTGRES_PASSWORD: qa
          POSTGRES_DB: qa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U qa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Prepare .env
        run: cp .env.example .env

      - name: Build SUT
        run: pnpm build

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright (chromium only — perf is desktop-Chrome)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @qa/tests exec playwright install --with-deps chromium

      - name: Install Playwright system deps only (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @qa/tests exec playwright install-deps chromium

      - name: Migrate + seed
        run: |
          pnpm db:migrate
          pnpm db:seed

      - name: Run Lighthouse + Web Vitals budgets
        run: pnpm --filter @qa/tests perf:lighthouse

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-playwright-report
          path: tests/playwright-report
          retention-days: 30
          if-no-files-found: warn

      - name: Upload perf test results (videos, traces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-test-results
          path: tests/test-results
          retention-days: 30
          if-no-files-found: ignore
