services:
  db:
    image: postgres:16
    container_name: qa-postgres
    environment:
      POSTGRES_USER: qa
      POSTGRES_PASSWORD: qa
      POSTGRES_DB: qa
    ports:
      - "5432:5432"
    volumes:
      - qa-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  qa-pgdata:
